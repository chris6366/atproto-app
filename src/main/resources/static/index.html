<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ATProto OAuth Demo</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <script src="/app.js" defer></script>
</head>

<body class="min-h-screen bg-zinc-50 text-zinc-900 dark:bg-zinc-950 dark:text-zinc-100">
<div class="flex min-h-screen items-center justify-center px-4">
  <main class="w-full max-w-md">
    <div class="rounded-xl border border-zinc-200 bg-white p-6 shadow-sm dark:border-zinc-800 dark:bg-zinc-900">
      <div id="loading" class="text-sm text-zinc-500">Loading...</div>

      <div id="signed-in" class="hidden space-y-4">
        <div class="flex items-center justify-between gap-4">
          <p class="text-sm text-zinc-600 dark:text-zinc-400">
            Signed in as <span id="did" class="font-mono"></span>
          </p>
          <button id="logout" class="text-sm text-zinc-500 hover:text-zinc-700 dark:text-zinc-400 dark:hover:text-zinc-200">
            Sign out
          </button>
        </div>

        <p class="text-green-600">Authentication working!</p>
      </div>

      <form id="login-form" class="hidden space-y-4">
        <div>
          <label for="handle" class="mb-1 block text-sm font-medium text-zinc-700 dark:text-zinc-300">
            Handle
          </label>
          <input
              id="handle"
              type="text"
              placeholder="user.example.com"
              class="w-full rounded-lg border border-zinc-300 bg-white px-3 py-2 text-zinc-900 dark:border-zinc-700 dark:bg-zinc-800 dark:text-zinc-100"
          />
        </div>

        <p id="error" class="hidden text-sm text-red-500"></p>

        <button id="login-button" type="submit" class="w-full rounded-lg bg-blue-600 px-4 py-2 text-white hover:bg-blue-700 disabled:opacity-50">
          Sign in
        </button>
      </form>
    </div>
  </main>
</div>
</body>
</html>
